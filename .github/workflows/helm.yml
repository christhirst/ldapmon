name: Helm

on:
    push:
        branches: ["main", "master"]
        tags: ["v*.*.*"]

jobs:
    helm-publish:
        name: Helm Package & Push
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4

            - name: Set up Helm
              uses: azure/setup-helm@v4
              with:
                  version: "v3.17.0"

            - name: Lint Helm Chart
              run: helm lint chart/

            - name: Render templates (dry-run validation)
              run: helm template ldapmon chart/ --debug > /dev/null

            # On tag pushes, update chart version to match the Git tag (strip leading 'v')
            - name: Set chart version from Git tag
              if: startsWith(github.ref, 'refs/tags/v')
              run: |
                  TAG="${GITHUB_REF_NAME#v}"
                  sed -i "s/^version:.*/version: ${TAG}/" chart/Chart.yaml
                  sed -i "s/^appVersion:.*/appVersion: \"${TAG}\"/" chart/Chart.yaml
                  echo "Chart version set to ${TAG}"

            - name: Package Helm Chart
              run: helm package chart/ --destination ./helm-dist/

            - name: Log in to DockerHub for Helm
              run: |
                  echo "${{ secrets.DOCKERHUB_TOKEN }}" \
                    | helm registry login registry-1.docker.io \
                        --username "${{ secrets.DOCKERHUB_USERNAME }}" \
                        --password-stdin

            - name: Push Helm chart to DockerHub OCI
              run: |
                  helm push ./helm-dist/ldapmon-*.tgz \
                    oci://registry-1.docker.io/${{ secrets.DOCKERHUB_USERNAME }}
