name: Helm

on:
    push:
        branches: ["main", "master"]
        tags: ["v*.*.*"]

jobs:
    helm-publish:
        name: Helm Package & Push
        runs-on: ubuntu-latest
        permissions:
            packages: write

        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4

            - name: Set up Helm
              uses: azure/setup-helm@v4
              with:
                  version: "v3.17.0"

            - name: Lint Helm Chart
              run: helm lint chart/

            - name: Render templates (dry-run validation)
              run: helm template ldapmon chart/ --debug > /dev/null

            # On tag pushes, update chart version to match the Git tag (strip leading 'v')
            - name: Set chart version from Git tag
              if: startsWith(github.ref, 'refs/tags/v')
              run: |
                  TAG="${GITHUB_REF_NAME#v}"
                  sed -i "s/^version:.*/version: ${TAG}/" chart/Chart.yaml
                  sed -i "s/^appVersion:.*/appVersion: \"${TAG}\"/" chart/Chart.yaml
                  echo "Chart version set to ${TAG}"

            - name: Package Helm Chart
              run: helm package chart/ --destination ./helm-dist/

            - name: Log in to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Push Helm chart to GHCR
              run: |
                  helm push ./helm-dist/ldapmon-*.tgz \
                    oci://ghcr.io/${{ github.repository_owner }}/charts
